services:
  - type: web
    name: onmarket-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python manage.py migrate && gunicorn online_shop.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DJANGO_SETTINGS_MODULE
        value: online_shop.settings
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: "onmarket-backend.onrender.com"

  - type: web
    name: onmarket-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublish: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://onmarket-backend.onrender.com/api
      - key: NIX_SSL_CERT_FILE
        value: /etc/ssl/certs/ca-certificates.crt
